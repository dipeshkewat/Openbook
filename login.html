<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e8f5f3, #b8e3dd);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #fff;
            width: 100%;
            max-width: 1200px;
            height: 700px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            display: flex;
            overflow: hidden;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-section {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .form-header a {
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            color: #28a745;
            transition: color 0.3s ease;
        }

        .form-header a:hover {
            color: #218838;
        }

        .form-header a.inactive {
            color: #888;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 25px;
            margin-bottom: 8px;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            font-size: 16px; /* Smaller font size */
            font-family: 'Times New Roman', Times, serif; /* Classic font */
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            border-color: #28a745;
        }

        .form-footer {
            text-align: right;
        }

        .form-footer a {
            font-size: 14px;
            color: #28a745;
            text-decoration: none;
            transition: text-decoration 0.3s ease;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .login-button {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .login-button:hover {
            background-color:#235347;
        }

        .image-section {
            flex: 1;
            background: linear-gradient(135deg, #d4f3ec, #a0e0d4);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .image-section img {
            max-width: 100%;
            width: 560px;
            object-fit: contain;
            animation: slideIn 1s ease-in-out;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-section">
            <div class="form-header">
                <a href="#" class="active">Login</a>
                <a href="signup.html" class="inactive">Sign up</a>
            </div>
            <form>
                <div class="form-group">
                    <label for="email">Email or Phone Number</label>
                    <input type="text" id="email" name="email" placeholder="Enter your email or phone number">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password">
                </div>
                <div class="form-footer">
                    <a href="#">Forgot your password?</a>
                </div>
                <button type="submit" class="login-button">Login</button>
            </form>
        </div>
        <div class="image-section">
            <img src="images/2a.png" alt="Laptop Illustration">
        </div>
    </div>
</body>
</html>
